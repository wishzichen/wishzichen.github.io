<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>老年友好端手机预览</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: #e5e7eb;
        font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      }
      .wrap {
        display: grid;
        justify-items: center;
        gap: 12px;
        padding: 16px;
      }
      .phone {
        width: min(390px, calc(100vw - 32px));
        height: min(844px, calc(100vh - 72px));
        overflow: hidden;
        border: 8px solid #020617;
        border-radius: 28px;
        background: #fff;
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.42);
      }
      iframe {
        width: 100%;
        height: 100%;
        display: block;
        border: 0;
        background: #fff;
      }
      .tip {
        max-width: 620px;
        text-align: center;
        color: #cbd5e1;
        font-size: 13px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="phone">
        <iframe src="./index.html?preview=1" title="老年友好端手机预览"></iframe>
      </div>
      <div class="tip">手机尺寸预览，重点检查大字、底部导航和触控按钮。</div>
    </div>
  </body>
</html>
