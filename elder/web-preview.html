<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智守银龄长者版网页预览</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: #e5e7eb;
        font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      }
      .wrap {
        width: min(1440px, calc(100vw - 32px));
        height: min(900px, calc(100vh - 72px));
        display: grid;
        gap: 12px;
      }
      .browser {
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 14px;
        background: #fff;
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.42);
      }
      .bar {
        height: 38px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        background: #202938;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #6b7280;
      }
      .address {
        flex: 1;
        min-width: 0;
        padding: 5px 10px;
        border-radius: 999px;
        background: #111827;
        color: #cbd5e1;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      iframe {
        width: 100%;
        height: calc(100% - 38px);
        border: 0;
        display: block;
        background: #fff;
      }
      .tip {
        text-align: center;
        color: #cbd5e1;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="browser">
        <div class="bar">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="address">/elder/index.html</span>
        </div>
        <iframe src="./index.html?preview=1" title="智守银龄长者版网页预览"></iframe>
      </div>
      <div class="tip">同站点网页预览，用于检查桌面端的真实使用体验。</div>
    </div>
  </body>
</html>
